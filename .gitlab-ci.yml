# GitLab CI/CD Pipeline for SOL Frontend (Monorepo)
# Deploys admin and client apps to S3 and invalidates CloudFront.
# Supports multiple environments: test (default), staging, prod.
# Values match infra: see infra/docs/CI_CD.md, ARCHITECTURE.md, env.hcl per env.
#
# AWS auth: Add GitLab Project Variables (Protected + Masked):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
# Per-env infra: Set in GitLab or below per job:
#   - S3_BUCKET_UI (or S3_BUCKET_UI_STAGING, S3_BUCKET_UI_PROD)
#   - CLOUDFRONT_DISTRIBUTION_ID (or _STAGING, _PROD)
# IAM user needs S3 + CloudFront (and KMS if bucket uses it) for each bucket/distribution.

stages:
  - install
  - build
  - test
  - deploy

variables:
  AWS_REGION: "eu-south-2"
  AWS_ACCOUNT_ID: "352374931426"
  NODE_VERSION: "22.16.0"
  PNPM_VERSION: "10.11.0"
  # Default env = test (used when DEPLOY_ENV not set)
  S3_BUCKET_UI: "sol-test-ui"
  CLOUDFRONT_DISTRIBUTION_ID: "EJVUXN1X9CK4C"
  # Staging env = staging (same style as test, values from staging infra)
  S3_BUCKET_UI_STAGING: "sol-staging-ui"
  # CloudFront distribution for staging: d363z78yxz0z0f.cloudfront.net
  CLOUDFRONT_DISTRIBUTION_ID_STAGING: "ENHL5W2T68KGX"

# Shared pnpm dependency cache (do not use artifacts for node_modules — exceeds GitLab size limits).
.pnpm_cache:
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - node_modules/
      - apps/*/node_modules/
      - packages/*/node_modules/

# Install dependencies (warms cache for build/test jobs)
install:
  extends: .pnpm_cache
  stage: install
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
  script:
    - pnpm install --frozen-lockfile
  only:
    - main
    - develop
    - staging
    - merge_requests
    - /^feature\/PCP-.*$/

# Build admin app (VITE_DEPLOY_ENV set from branch: main=production, develop=test, staging=staging)
build:admin:
  extends: .pnpm_cache
  stage: build
  image: node:${NODE_VERSION}-alpine
  variables:
    VITE_API_BASE_URL: "/api"
    VITE_FRONTEND_BASE_URL: "/admin"
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - |
      case "$CI_COMMIT_REF_NAME" in
        main)    export VITE_DEPLOY_ENV=production ;;
        develop) export VITE_DEPLOY_ENV=test ;;
        staging) export VITE_DEPLOY_ENV=staging ;;
        *)       export VITE_DEPLOY_ENV=test ;;
      esac
    - echo "Building admin app (${VITE_DEPLOY_ENV:-test})..."
    - cd apps/admin
    - pnpm build
  artifacts:
    paths:
      - apps/admin/dist/
    expire_in: 1 hour
  only:
    - main
    - develop
    - staging
    - merge_requests
    - /^feature\/PCP-.*$/

# Build client app
build:client:
  extends: .pnpm_cache
  stage: build
  image: node:${NODE_VERSION}-alpine
  variables:
    # API base (same-origin behind CloudFront)
    VITE_API_BASE_URL: "/api"
    # Frontend base path (works for test + staging): origin + /client
    VITE_FRONTEND_BASE_URL: "/client"
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - echo "Building client app..."
    - cd apps/client
    - pnpm build
  artifacts:
    paths:
      - apps/client/dist/
    expire_in: 1 hour
  only:
    - main
    - develop
    - staging
    - merge_requests
    - /^feature\/PCP-.*$/

# Unit tests: node:alpine (E2E disabled). Split admin/client for parallelism. Uses pnpm cache + install.
# Merge requests: vitest --changed vs MR target branch (see scripts/ci-vitest.sh). Other pipelines: full suite.
# GIT_DEPTH=0 so shallow clones can resolve merge-base for --changed.
# TODO: E2E tests temporarily disabled due to slow/flaky tests - needs optimization
test:admin:
  extends: .pnpm_cache
  stage: test
  image: node:${NODE_VERSION}-alpine
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - sh scripts/ci-vitest.sh admin
  only:
    - main
    - develop
    - staging
    - merge_requests
    - /^feature\/PCP-.*$/

test:client:
  extends: .pnpm_cache
  stage: test
  image: node:${NODE_VERSION}-alpine
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - sh scripts/ci-vitest.sh client
  only:
    - main
    - develop
    - staging
    - merge_requests
    - /^feature\/PCP-.*$/

# --- Deploy: runs per environment. Each env needs its own S3 bucket + CloudFront (or path). ---
# To add staging/prod: add jobs like deploy:admin:staging, deploy:admin:prod (see bottom).
# Set GitLab CI/CD variables per env, e.g. S3_BUCKET_UI_STAGING, CLOUDFRONT_DISTRIBUTION_ID_STAGING,
# and override in the job with variables: { S3_BUCKET_UI: $S3_BUCKET_UI_STAGING, ... }.

.deploy_base:
  stage: deploy
  image:
    name: amazon/aws-cli:2.15.0
    entrypoint: [""]
  interruptible: true
  before_script:
    - export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    - export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    - export AWS_DEFAULT_REGION=${AWS_REGION}

# --- TEST (current): develop, feature branches, main ---
deploy:admin:test:
  extends: .deploy_base
  dependencies:
    - build:admin
  script:
    - |
      echo "Deploying admin app to S3 (test): ${S3_BUCKET_UI}/admin/"
      aws s3 sync apps/admin/dist/ s3://${S3_BUCKET_UI}/admin/ \
        --delete \
        --cache-control "public, max-age=31536000" --exclude "*.html" --exclude "*.json"
      aws s3 sync apps/admin/dist/ s3://${S3_BUCKET_UI}/admin/ \
        --cache-control "public, max-age=300" --include "*.html" --include "*.json"
      aws s3 sync __sim/ s3://${S3_BUCKET_UI}/__sim/ \
        --delete \
        --cache-control "public, max-age=31536000" --exclude "*.html" \
        --exclude "*.js"
      aws s3 sync __sim/ s3://${S3_BUCKET_UI}/__sim/ \
        --cache-control "public, max-age=300" --include "*.html" --include "*.js"
      INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/admin/*" "/__sim/*" --query 'Invalidation.Id' --output text)
      echo "Invalidation created: ${INVALIDATION_ID}"
  environment:
    name: test/admin
  only:
    - develop

deploy:client:test:
  extends: .deploy_base
  dependencies:
    - build:client
  script:
    - |
      echo "Deploying client app to S3 (test): ${S3_BUCKET_UI}/client/"
      aws s3 sync apps/client/dist/ s3://${S3_BUCKET_UI}/client/ \
        --delete \
        --cache-control "public, max-age=31536000" --exclude "*.html" --exclude "*.json"
      aws s3 sync apps/client/dist/ s3://${S3_BUCKET_UI}/client/ \
        --cache-control "public, max-age=300" --include "*.html" --include "*.json"
      INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/client/*" --query 'Invalidation.Id' --output text)
      echo "Invalidation created: ${INVALIDATION_ID}"
  environment:
    name: test/client
  only:
    - develop

# --- STAGING (PCP-406) ---
# Deploys to sol-staging-ui + staging CloudFront. For testing, feature/PCP-406-staging-ci also triggers staging deploy.

deploy:admin:staging:
  extends: .deploy_base
  dependencies:
    - build:admin
  variables:
    S3_BUCKET_UI: $S3_BUCKET_UI_STAGING
    CLOUDFRONT_DISTRIBUTION_ID: $CLOUDFRONT_DISTRIBUTION_ID_STAGING
  script:
    - |
      echo "Deploying admin app to S3 (staging): ${S3_BUCKET_UI}/admin/"
      aws s3 sync apps/admin/dist/ s3://${S3_BUCKET_UI}/admin/ \
        --delete \
        --cache-control "public, max-age=31536000" --exclude "*.html" --exclude "*.json"
      aws s3 sync apps/admin/dist/ s3://${S3_BUCKET_UI}/admin/ \
        --cache-control "public, max-age=300" --include "*.html" --include "*.json"
      aws s3 sync __sim/ s3://${S3_BUCKET_UI}/__sim/ \
        --delete \
        --cache-control "public, max-age=31536000" --exclude "*.html" \
        --exclude "*.js"
      aws s3 sync __sim/ s3://${S3_BUCKET_UI}/__sim/ \
        --cache-control "public, max-age=300" --include "*.html" --include "*.js"
      INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/admin/*" "/__sim/*" --query 'Invalidation.Id' --output text)
      echo "Invalidation created (staging): ${INVALIDATION_ID}"
  environment:
    name: staging/admin
  only:
    - staging

deploy:client:staging:
  extends: .deploy_base
  dependencies:
    - build:client
  variables:
    S3_BUCKET_UI: $S3_BUCKET_UI_STAGING
    CLOUDFRONT_DISTRIBUTION_ID: $CLOUDFRONT_DISTRIBUTION_ID_STAGING
  script:
    - |
      echo "Deploying client app to S3 (staging): ${S3_BUCKET_UI}/client/"
      aws s3 sync apps/client/dist/ s3://${S3_BUCKET_UI}/client/ \
        --delete \
        --cache-control "public, max-age=31536000" --exclude "*.html" --exclude "*.json"
      aws s3 sync apps/client/dist/ s3://${S3_BUCKET_UI}/client/ \
        --cache-control "public, max-age=300" --include "*.html" --include "*.json"
      INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/client/*" --query 'Invalidation.Id' --output text)
      echo "Invalidation created (staging): ${INVALIDATION_ID}"
  environment:
    name: staging/client
  only:
    - staging

# --- PROD (when ready) ---
# Add jobs like deploy:admin:prod, deploy:client:prod.
# For each: extends .deploy_base, dependencies, variables (S3_BUCKET_UI + CLOUDFRONT_DISTRIBUTION_ID),
# script (same S3 sync + invalidation as test/staging), environment name, only.
# GitLab variables: S3_BUCKET_UI_PROD, CLOUDFRONT_DISTRIBUTION_ID_PROD.
# Typical only: prod -> main.

